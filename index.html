<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalendarz Eventowo-Urlopowy 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #16161d;
    --surface2: #1e1e28;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0eff5;
    --text2: #8b8a9e;
    --text3: #55546a;
    --accent: #6b63ff;

    --vacation-bg: rgba(244,114,182,0.13);
    --vacation-tx: #f9a8d4;
    --vacation-bar: #ec4899;

    --company-bg: rgba(34,197,129,0.13);
    --company-tx: #4ade9e;
    --company-bar: #22c581;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 2rem 2.5rem 3rem;
    font-size: 14px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-left { display: flex; align-items: baseline; gap: 14px; }

  .month-name {
    font-size: 32px;
    font-weight: 300;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .year-badge {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text3);
    letter-spacing: .04em;
  }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .nav-btn {
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    color: var(--text2);
    padding: 7px 16px;
    cursor: pointer;
    font-size: 15px;
    font-family: inherit;
    transition: background .15s, color .15s;
  }
  .nav-btn:hover { background: var(--surface); color: var(--text); }

  .add-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    padding: 8px 18px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    transition: opacity .15s;
  }
  .add-btn:hover { opacity: .85; }

  .legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
    padding-bottom: 1.25rem;
    border-bottom: 0.5px solid var(--border);
  }

  .leg-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    user-select: none;
    transition: opacity .15s;
  }
  .leg-item.hidden { opacity: .28; }
  .leg-dot { width: 22px; height: 6px; border-radius: 3px; flex-shrink: 0; }

  .cal-container { border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; }

  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, minmax(0,1fr));
    border-bottom: 0.5px solid var(--border);
  }

  .dh {
    background: var(--surface);
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .1em;
    color: var(--text3);
    padding: 10px 0;
    text-transform: uppercase;
  }
  .dh.we { color: #6b5a4e; }

  .week-row {
    display: grid;
    grid-template-columns: repeat(7, minmax(0,1fr));
    position: relative;
    border-bottom: 0.5px solid var(--border);
  }
  .week-row:last-child { border-bottom: none; }

  .day-cell {
    border-right: 0.5px solid var(--border);
    min-height: 108px;
    padding: 8px 7px 6px;
    position: relative;
    background: var(--bg);
  }
  .day-cell:last-child { border-right: none; }
  .day-cell.other { background: var(--surface); }
  .day-cell.today { background: rgba(107,99,255,.04); }
  .day-cell.today::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .day-num {
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    margin-bottom: 2px;
  }
  .day-cell.today .day-num { background: var(--accent); color: #fff; }
  .day-cell.we .day-num { color: #6b5060; }
  .day-cell.other .day-num { opacity: .25; }

  .spans-layer {
    position: absolute;
    top: 36px;
    left: 0; right: 0;
    pointer-events: none;
    z-index: 2;
  }

  .span-track {
    display: grid;
    grid-template-columns: repeat(7, minmax(0,1fr));
    height: 22px;
    margin-bottom: 3px;
  }

  .sbar {
    height: 20px;
    font-size: 11px;
    font-weight: 500;
    display: flex;
    align-items: center;
    padding: 0 8px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    margin: 1px 0;
  }
  .sbar.si { border-radius: 4px; margin: 1px 4px; }
  .sbar.ss { border-radius: 4px 0 0 4px; margin-left: 4px; }
  .sbar.sm { border-radius: 0; }
  .sbar.se { border-radius: 0 4px 4px 0; margin-right: 4px; }

  .sbar.vacation { background: var(--vacation-bg); color: var(--vacation-tx); }
  .sbar.company  { background: var(--company-bg);  color: var(--company-tx); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 14px;
    padding: 1.75rem;
    width: 360px;
    animation: fadeUp .2s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .modal h3 { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 1.25rem; letter-spacing: -.2px; }

  .modal label {
    font-size: 11px;
    color: var(--text3);
    display: block;
    margin-bottom: 4px;
    margin-top: 12px;
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .modal input, .modal select {
    width: 100%;
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: 7px;
    padding: 8px 11px;
    font-size: 13px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal select option { background: var(--surface); }

  .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-btns { display: flex; gap: 8px; margin-top: 1.5rem; align-items: center; justify-content: flex-end; }

  .btn-del    { background:none; border:0.5px solid rgba(239,68,68,.4); color:#f87171; border-radius:7px; padding:7px 14px; font-size:13px; cursor:pointer; font-family:inherit; margin-right:auto; }
  .btn-del:hover { background: rgba(239,68,68,.1); }
  .btn-cancel { background:none; border:0.5px solid var(--border2); color:var(--text2); border-radius:7px; padding:7px 14px; font-size:13px; cursor:pointer; font-family:inherit; }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-save   { background:var(--accent); border:none; color:#fff; border-radius:7px; padding:8px 18px; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; }
  .btn-save:hover { opacity:.88; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="month-name" id="monthName"></span>
    <span class="year-badge" id="yearBadge"></span>
  </div>
  <div class="header-right">
    <button class="nav-btn" onclick="nav(-1)">&#8592;</button>
    <button class="nav-btn" onclick="nav(1)">&#8594;</button>
    <button class="add-btn" onclick="openAdd()">+ Dodaj event</button>
  </div>
</div>

<div class="legend" id="legend"></div>

<div class="cal-container">
  <div class="day-headers" id="dayHeaders"></div>
  <div class="cal-body" id="calBody"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle">Nowy event</h3>
    <label>Tytuł</label>
    <input type="text" id="mTitle" placeholder="Nazwa eventu...">
    <label>Kategoria</label>
    <select id="mCat"></select>
    <div class="date-row">
      <div><label>Od</label><input type="date" id="mStart"></div>
      <div><label>Do</label><input type="date" id="mEnd"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-del" id="btnDel" style="display:none" onclick="deleteEvent()">Usuń</button>
      <button class="btn-cancel" onclick="closeModal()">Anuluj</button>
      <button class="btn-save" onclick="saveEvent()">Zapisz</button>
    </div>
  </div>
</div>

<script>
const MONTHS = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
const DAYS   = ['Pon','Wt','Śr','Czw','Pt','Sob','Nie'];

const CATS = [
  { id:'vacation', label:'Urlop',         bar:'#ec4899' },
  { id:'company',  label:'Event firmowy', bar:'#22c581' },
];

function d(y,m,day){ return new Date(y,m,day).getTime(); }

let state = {
  year: 2026, month: 3,
  hidden: new Set(),
  editId: null,
  nextId: 200,
  events: [
    // Urlopy kwiecień
    { id:1,  title:'Martyna Z. — urlop',      cat:'vacation', start:d(2026,3,2),  end:d(2026,3,8)  },
    { id:2,  title:'Karolina P. — urlop',     cat:'vacation', start:d(2026,3,2),  end:d(2026,3,3)  },
    { id:3,  title:'Aneta K-K — urlop',       cat:'vacation', start:d(2026,3,3),  end:d(2026,3,3)  },
    { id:4,  title:'Joanna F. — urlop',       cat:'vacation', start:d(2026,3,3),  end:d(2026,3,4)  },
    { id:5,  title:'Anna — urlop',            cat:'vacation', start:d(2026,3,4),  end:d(2026,3,4)  },
    { id:6,  title:'Maciej — urlop',          cat:'vacation', start:d(2026,3,4),  end:d(2026,3,11) },
    { id:7,  title:'Dokumentacja – Zakopane', cat:'vacation', start:d(2026,3,11), end:d(2026,3,13) },
    { id:8,  title:'Martyna Z. — urlop',      cat:'vacation', start:d(2026,3,27), end:d(2026,4,3)  },
    // Eventy firmowe kwiecień
    { id:9,  title:'P&G x Biedronka',           cat:'company', start:d(2026,3,1),  end:d(2026,3,2)  },
    { id:10, title:'Hebe otwarcie – Gdynia',    cat:'company', start:d(2026,3,2),  end:d(2026,3,4)  },
    { id:11, title:'Gala Stypendystów',          cat:'company', start:d(2026,3,9),  end:d(2026,3,10) },
    { id:12, title:'Pepsi transmisja',           cat:'company', start:d(2026,3,10), end:d(2026,3,10) },
    { id:13, title:'Dokumentacja – zakopane',   cat:'company', start:d(2026,3,11), end:d(2026,3,12) },
    { id:14, title:'Hebe otwarcie – Ozorki',    cat:'company', start:d(2026,3,25), end:d(2026,3,26) },
    { id:15, title:'Dr Witt x Żabka',           cat:'company', start:d(2026,3,27), end:d(2026,3,28) },
    { id:16, title:'SGP – Monachium',           cat:'company', start:d(2026,4,1),  end:d(2026,4,2)  },
  ]
};

function render() {
  const { year, month } = state;
  document.getElementById('monthName').textContent = MONTHS[month];
  document.getElementById('yearBadge').textContent = year;
  renderLegend();
  renderHeaders();
  renderBody();
}

function renderLegend() {
  document.getElementById('legend').innerHTML = CATS.map(c =>
    `<div class="leg-item${state.hidden.has(c.id)?' hidden':''}" onclick="toggleCat('${c.id}')">
      <span class="leg-dot" style="background:${c.bar}"></span>${c.label}
    </div>`
  ).join('');
}

function renderHeaders() {
  document.getElementById('dayHeaders').innerHTML = DAYS.map((d,i) =>
    `<div class="dh${i>=5?' we':''}">${d}</div>`
  ).join('');
}

function renderBody() {
  const { year, month } = state;
  const today = new Date();
  const firstDow = (() => { let x = new Date(year, month, 1).getDay(); return x === 0 ? 6 : x - 1; })();
  const dim  = new Date(year, month+1, 0).getDate();
  const dimp = new Date(year, month,   0).getDate();

  const cells = [];
  for (let i = 0; i < firstDow; i++)
    cells.push({ day: dimp - firstDow + 1 + i, m: month-1, y: year, other: true });
  for (let d2 = 1; d2 <= dim; d2++)
    cells.push({ day: d2, m: month, y: year, other: false });
  while (cells.length % 7 !== 0)
    cells.push({ day: cells.length - dim - firstDow + 1, m: month+1, y: year, other: true });

  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i+7));

  let html = '';
  weeks.forEach(wk => {
    const wt = wk.map(c => new Date(c.y, c.m, c.day).getTime());

    const visEvs = state.events.filter(e => {
      if (state.hidden.has(e.cat)) return false;
      return e.end >= wt[0] && e.start <= wt[6];
    });

    const slotMap = {};
    const placed  = [];
    visEvs.forEach(e => {
      let slot = 0;
      while (true) {
        let ok = true;
        for (let di = 0; di < 7; di++) {
          const t = wt[di];
          if (e.start <= t && t <= e.end && slotMap[`${di},${slot}`]) { ok = false; break; }
        }
        if (ok) break;
        slot++;
      }
      for (let di = 0; di < 7; di++) {
        const t = wt[di];
        if (e.start <= t && t <= e.end) slotMap[`${di},${slot}`] = true;
      }
      placed.push({ e, slot });
    });

    const maxSlot = placed.length ? Math.max(...placed.map(p => p.slot)) : -1;

    let spansHtml = '';
    for (let s = 0; s <= maxSlot; s++) {
      const row = placed.filter(p => p.slot === s);
      const cols = Array(7).fill('');
      row.forEach(({ e }) => {
        for (let di = 0; di < 7; di++) {
          const t = wt[di];
          if (e.start <= t && t <= e.end) {
            const first = t === e.start || (di === 0 && e.start < t);
            const last  = t === e.end   || (di === 6 && e.end   > t);
            const showLabel = di === 0 || (e.start >= wt[0] && t === e.start);
            const pos = first && last ? 'si' : first ? 'ss' : last ? 'se' : 'sm';
            cols[di] = `<div class="sbar ${e.cat} ${pos}">${showLabel ? e.title : ''}</div>`;
          }
        }
      });
      spansHtml += `<div class="span-track">${cols.map(c => c || '<div></div>').join('')}</div>`;
    }

    const minH = Math.max(108, 40 + (maxSlot + 1) * 25 + 10);

    const cellsHtml = wk.map(c => {
      const dow  = new Date(c.y, c.m, c.day).getDay();
      const isWe = dow === 0 || dow === 6;
      const isTd = c.day === today.getDate() && c.m === today.getMonth() && c.y === today.getFullYear();
      const cls  = ['day-cell', c.other?'other':'', isWe?'we':'', isTd?'today':''].filter(Boolean).join(' ');
      return `<div class="${cls}" style="min-height:${minH}px">
        <span class="day-num">${c.day}</span>
      </div>`;
    }).join('');

    html += `<div class="week-row" style="min-height:${minH}px">
      ${cellsHtml}
      <div class="spans-layer">${spansHtml}</div>
    </div>`;
  });

  document.getElementById('calBody').innerHTML = html;
}

window.nav = dir => {
  state.month += dir;
  if (state.month > 11) { state.month = 0; state.year++; }
  if (state.month < 0)  { state.month = 11; state.year--; }
  render();
};

window.toggleCat = cat => {
  state.hidden.has(cat) ? state.hidden.delete(cat) : state.hidden.add(cat);
  render();
};

function populateCatSelect(selected) {
  document.getElementById('mCat').innerHTML = CATS.map(c =>
    `<option value="${c.id}"${c.id === selected ? ' selected' : ''}>${c.label}</option>`
  ).join('');
}

window.openAdd = () => {
  state.editId = null;
  document.getElementById('modalTitle').textContent = 'Nowy event';
  document.getElementById('mTitle').value = '';
  const td = new Date().toISOString().split('T')[0];
  document.getElementById('mStart').value = td;
  document.getElementById('mEnd').value   = td;
  document.getElementById('btnDel').style.display = 'none';
  populateCatSelect('vacation');
  document.getElementById('modalOverlay').classList.add('open');
};

window.closeModal = (e) => {
  if (!e || e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
};

window.saveEvent = () => {
  const title = document.getElementById('mTitle').value.trim();
  const cat   = document.getElementById('mCat').value;
  const ss    = document.getElementById('mStart').value;
  const es    = document.getElementById('mEnd').value;
  if (!title || !ss || !es) return;
  const [sy,sm,sd] = ss.split('-').map(Number);
  const [ey,em,ed] = es.split('-').map(Number);
  const start = new Date(sy, sm-1, sd).getTime();
  const end   = new Date(ey, em-1, ed).getTime();
  if (state.editId !== null) {
    const ev = state.events.find(e => e.id === state.editId);
    if (ev) { ev.title = title; ev.cat = cat; ev.start = start; ev.end = end; }
  } else {
    state.events.push({ id: state.nextId++, title, cat, start, end });
  }
  document.getElementById('modalOverlay').classList.remove('open');
  render();
};

window.deleteEvent = () => {
  if (state.editId !== null) {
    state.events = state.events.filter(e => e.id !== state.editId);
    state.editId = null;
    document.getElementById('modalOverlay').classList.remove('open');
    render();
  }
};

render();
</script>
</body>
</html>
